<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legends of Auros - Character Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Crimson Pro', serif; background-color: #1a1a1a; color: #333; }
        .parchment { background: #fdf6e3; border: 10px double #2d2d2d; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        .stat-header { background: #000; color: #fff; font-size: 0.7rem; font-weight: bold; text-align: center; padding: 2px; text-transform: uppercase; }
        .input-underline { border-bottom: 1px solid #000; background: transparent; width: 100%; padding: 2px; }
        .input-underline:focus { outline: none; background: #fffbeb; }
        .stat-box { border: 2px solid #000; padding: 4px; text-align: center; background: white; }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-5xl mx-auto parchment p-4 md:p-8">
        <div class="flex flex-wrap gap-2 mb-6 justify-center no-print">
            <button onclick="generateRandom()" class="bg-indigo-800 text-white px-4 py-2 rounded font-bold">🎲 AUTO-ROLL NEW</button>
            <button onclick="saveCharacter()" class="bg-green-800 text-white px-4 py-2 rounded font-bold">💾 SAVE DATA</button>
            <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded font-bold">🖨️ PRINT SHEET</button>
        </div>

        <h1 class="text-4xl font-black text-center mb-6 tracking-tighter border-b-4 border-black pb-2">LEGENDS OF AUROS</h1>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div><label class="block text-xs font-bold uppercase">Character Name</label><input id="name" type="text" class="input-underline text-xl font-bold" placeholder="Xarrus"></div>
            <div><label class="block text-xs font-bold uppercase">Race / Ancestry</label><input id="race" type="text" class="input-underline" placeholder="Dwarf / Ailguard"></div>
            <div><label class="block text-xs font-bold uppercase">Role</label><input id="role" type="text" class="input-underline" placeholder="Warrior"></div>
            <div><label class="block text-xs font-bold uppercase">Level</label><input id="level" type="number" class="input-underline font-bold" value="10"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-4">
                <div class="stat-header">Attributes & Modifiers</div>
                <div id="attr-list" class="space-y-2">
                    </div>

                <div class="stat-header mt-6">Combat Stats</div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="stat-box">
                        <span class="block text-[10px] font-bold">INITIATIVE</span>
                        <input id="init" type="text" class="text-xl font-bold w-full text-center" value="d8+4">
                    </div>
                    <div class="stat-box">
                        <span class="block text-[10px] font-bold">DEFENSE</span>
                        <input id="defense" type="text" class="text-xl font-bold w-full text-center" value="10/12">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="stat-box border-4 border-black py-6">
                    <span class="block text-xs font-bold uppercase">Current Health</span>
                    <input id="hp" type="number" class="text-5xl font-black text-red-700 w-full text-center" value="102">
                </div>
                
                <div class="stat-header">Combat & Magic Skills (B I A E M)</div>
                <div id="combat-skills" class="space-y-1 text-sm">
                    </div>
            </div>

            <div class="space-y-4">
                <div class="stat-header">Armor & Equipment</div>
                <textarea id="gear" class="w-full h-40 border-2 border-black p-2 bg-white text-sm" placeholder="Admite Helm, Admite Armor..."></textarea>
                
                <div class="stat-header">Role Traits & Info</div>
                <textarea id="traits" class="w-full h-64 border-2 border-black p-2 bg-white text-xs leading-tight" placeholder="Battle Awareness, FS Guardian..."></textarea>
            </div>

        </div>
    </div>

    <script>
        const attributes = [
            { name: "Strength", id: "str" },
            { name: "Reflexes", id: "ref" },
            { name: "Health", id: "hea" },
            { name: "Intellect", id: "int" },
            { name: "Wisdom", id: "wis" },
            { name: "Charisma", id: "cha" }
        ];

        const skills = ["Blade", "Sword", "Shield", "Brawl", "Lift", "Jump", "Alert", "First Aid"];

        function init() {
            // Render Attributes
            const attrContainer = document.getElementById('attr-list');
            attributes.forEach(a => {
                attrContainer.innerHTML += `
                    <div class="flex items-center justify-between bg-white border border-gray-300 p-1 px-3 rounded">
                        <span class="font-bold text-sm uppercase">${a.name}</span>
                        <input id="${a.id}" type="number" class="w-12 text-center font-bold text-xl" value="10" oninput="updateMod('${a.id}')">
                        <div id="${a.id}Mod" class="w-10 font-black text-blue-700 text-center">+0</div>
                    </div>
                `;
            });

            // Render Skills
            const skillContainer = document.getElementById('combat-skills');
            skills.forEach(s => {
                skillContainer.innerHTML += `
                    <div class="flex items-center justify-between border-b border-gray-300 py-1 bg-white px-2">
                        <span class="font-bold text-xs truncate w-20">${s}</span>
                        <div class="flex gap-1">
                            ${[1,2,3,4,5].map(i => `<input type="checkbox" class="w-3 h-3">`).join('')}
                        </div>
                        <input type="number" class="w-8 text-center font-bold text-xs" placeholder="0">
                    </div>
                `;
            });

            loadCharacter();
        }

        function updateMod(id) {
            const val = document.getElementById(id).value;
            const mod = Math.floor((val - 10) / 2);
            document.getElementById(id + 'Mod').innerText = (mod >= 0 ? '+' : '') + mod;
        }

        function generateRandom() {
            attributes.forEach(a => {
                const roll = Math.floor(Math.random() * 6) + Math.floor(Math.random() * 6) + Math.floor(Math.random() * 6) + 3;
                document.getElementById(a.id).value = roll;
                updateMod(a.id);
            });
            document.getElementById('hp').value = Math.floor(Math.random() * 50) + 50;
        }

        function saveCharacter() {
            const data = {};
            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                if (input.type === 'checkbox') {
                    // Logic to save checkboxes can be added here
                } else {
                    data[input.id] = input.value;
                }
            });
            localStorage.setItem('auros_character_data', JSON.stringify(data));
            alert("Character Saved to Browser Cache!");
        }

        function loadCharacter() {
            const saved = localStorage.getItem('auros_character_data');
            if (!saved) return;
            const data = JSON.parse(saved);
            Object.keys(data).forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    el.value = data[key];
                    if (attributes.some(a => a.id === key)) updateMod(key);
                }
            });
        }

        init();
    </script>
</body>
</html>

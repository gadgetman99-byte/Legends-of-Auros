<div class="mt-6 border-t-2 border-black pt-4">
    <h2 class="text-xl font-bold mb-4">SKILLS (B I A E M)</h2>
    <div id="skills-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        </div>
</div>

<script>
    const combatSkills = ["Blade", "Sword", "Shield", "Brawl"];
    
    function renderSkills() {
        const container = document.getElementById('skills-list');
        combatSkills.forEach(skill => {
            container.innerHTML += `
                <div class="flex items-center justify-between border-b border-gray-300 py-1">
                    <span class="text-sm font-bold w-20">${skill}</span>
                    <div class="flex gap-1">
                        ${[1,2,3,4,5].map(i => `<input type="checkbox" class="w-4 h-4">`).join('')}
                    </div>
                    <input type="number" class="w-10 text-center font-bold" placeholder="Mod">
                </div>
            `;
        });
    }
    renderSkills();

    // Updated Auto-Roll to include a random Name and Race
    function generateRandom() {
        const names = ["Xarrus", "Thrain", "Gimli", "Brak"];
        const races = ["Dwarf", "Human", "Elf", "Orc"];
        
        document.getElementById('name').value = names[Math.floor(Math.random() * names.length)];
        document.getElementById('race').value = races[Math.floor(Math.random() * races.length)];
        
        // Roll 3d6 for all attributes
        attributeNames.forEach(attr => {
            const id = attr.toLowerCase().substring(0, 3);
            const roll = Math.floor(Math.random() * 6) + Math.floor(Math.random() * 6) + Math.floor(Math.random() * 6) + 3;
            document.getElementById(id).value = roll;
            updateMod(id);
        });
    }
</script>
